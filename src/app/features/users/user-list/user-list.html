<!-- Page Header -->
<div class="page-header">
  <div class="page-header-left">
    <div class="page-icon">
      <i class="pi pi-user"></i>
    </div>
    <div class="page-header-text">
      <h1 class="page-title">Users</h1>
      <p class="page-subtitle"><a routerLink="/" class="breadcrumb-link">Home</a> / Users</p>
    </div>
  </div>
  <div class="page-header-right">
    <p-button label="+ Add User" (onClick)="openAddForm()" styleClass="add-btn" />
  </div>
</div>

<!-- Tab Navigation -->
<div class="tab-nav">
  @for (tab of tabs; track tab.value) {
    <button type="button" class="tab-item" [class.active]="activeTab() === tab.value" (click)="setTab(tab.value)">
      {{ tab.label }}
      <span class="tab-count">{{ tabCounts()[tab.value] }}</span>
    </button>
  }
</div>

<!-- Search -->
<div class="toolbar">
  <div class="toolbar-left">
    <p-iconfield>
      <p-inputicon class="pi pi-search" />
      <input pInputText type="text" placeholder="Search by name, email, role..." (input)="onFilter(dt, $event)" />
    </p-iconfield>
  </div>
</div>

<!-- Data Table -->
<p-table
  #dt
  [value]="filteredUsers()"
  [paginator]="true"
  paginatorDropdownAppendTo="body"
  [rows]="10"
  [rowsPerPageOptions]="[5, 10, 20]"
  [globalFilterFields]="['name', 'email', 'phone', 'role', 'status']"
  [tableStyle]="{ 'min-width': '100%' }"
  [scrollable]="true"
  [stripedRows]="false"
  currentPageReportTemplate="Showing {first}-{last} from {totalRecords}"
  [showCurrentPageReport]="true"
  class="customer-table"
>
  <ng-template #header>
    <tr>
      <th pSortableColumn="name">User <p-sortIcon field="name" /></th>
      <th pSortableColumn="phone">Phone</th>
      <th pSortableColumn="role">Role <p-sortIcon field="role" /></th>
      <th pSortableColumn="status">Status <p-sortIcon field="status" /></th>
      <th pSortableColumn="addDate">Added <p-sortIcon field="addDate" /></th>
      <th pSortableColumn="lastLogin">Last Login <p-sortIcon field="lastLogin" /></th>
      <th style="width: 4rem">Action</th>
    </tr>
  </ng-template>

  <ng-template #body let-user>
    <tr class="table-row">
      <td>
        <div class="client-cell">
          <div class="client-avatar" [style.background]="getAvatarColor(user.name)">
            {{ getInitials(user.name) }}
          </div>
          <div class="client-info">
            <span class="client-name">{{ user.name }}</span>
            <span class="client-id">{{ user.email }}</span>
          </div>
        </div>
      </td>
      <td class="text-muted">{{ user.phone || '-' }}</td>
      <td>
        <p-tag [value]="user.role" [severity]="getRoleSeverity(user.role)" />
      </td>
      <td>
        <p-tag [value]="user.status" [severity]="getStatusSeverity(user.status)" />
      </td>
      <td class="text-muted">{{ user.addDate }}</td>
      <td class="text-muted">{{ user.lastLogin }}</td>
      <td>
        <button
          class="action-btn"
          type="button"
          (click)="showActionMenu($event, user)"
          [attr.aria-label]="'Actions for ' + user.name"
        >
          <i class="pi pi-ellipsis-v"></i>
        </button>
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="7" class="empty-message">
        <div class="empty-icon-wrap">
          <i class="pi pi-user"></i>
        </div>
        <p class="empty-title">No users found</p>
        <p class="empty-desc">Try adjusting your search or filters.</p>
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- Action Menu -->
<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<!-- Confirm Dialog -->
<p-confirmdialog />
