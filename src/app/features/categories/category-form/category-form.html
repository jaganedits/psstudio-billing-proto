<p-dialog
  [header]="isEditing() ? 'Edit Category' : 'Add Category'"
  [visible]="visible()"
  (visibleChange)="cancel.emit()"
  [modal]="true"
  [style]="{ width: '480px' }"
  [closable]="true"
  appendTo="body"
>
  <form [formGroup]="form" class="dialog-form">
    <div class="form-field">
      <label class="field-label">CATEGORY NAME *</label>
      <input pInputText formControlName="name" placeholder="Enter category name" class="w-full" />
      @if (form.get('name')?.touched && form.get('name')?.hasError('required')) {
        <small class="form-error">Name is required</small>
      }
      @if (form.get('name')?.touched && form.get('name')?.hasError('minlength')) {
        <small class="form-error">Name must be at least 2 characters</small>
      }
    </div>
    <div class="form-field">
      <label class="field-label">DESCRIPTION</label>
      <textarea pInputText formControlName="description" placeholder="Category description" class="w-full" rows="3"></textarea>
    </div>
  </form>
  <ng-template #footer>
    <p-button label="Cancel" [outlined]="true" severity="secondary" (onClick)="cancel.emit()" />
    <p-button [label]="isEditing() ? 'Update' : 'Save'" icon="pi pi-check" (onClick)="onSubmit()" styleClass="add-btn" />
  </ng-template>
</p-dialog>
