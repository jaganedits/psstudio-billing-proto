<!-- Page Header -->
<div class="page-header">
  <div class="page-header-left">
    <div class="page-icon">
      <i class="pi pi-th-large"></i>
    </div>
    <div class="page-header-text">
      <h1 class="page-title">Categories</h1>
      <p class="page-subtitle"><a routerLink="/" class="breadcrumb-link">Home</a> / Categories</p>
    </div>
  </div>
  <div class="page-header-right">
    <p-button icon="pi pi-file-excel" [outlined]="true" severity="success" [rounded]="true" pTooltip="Export Excel" tooltipPosition="bottom" />
    <p-button icon="pi pi-file-pdf" [outlined]="true" severity="danger" [rounded]="true" pTooltip="Export PDF" tooltipPosition="bottom" />
    <p-button label="+ Add Category" (onClick)="openAddForm()" styleClass="add-btn" />
  </div>
</div>

<!-- Tab Navigation -->
<div class="tab-nav">
  @for (tab of tabs; track tab.value) {
    <button type="button" class="tab-item" [class.active]="activeTab() === tab.value" (click)="setTab(tab.value)">
      {{ tab.label }}
      <span class="tab-count">{{ tabCounts()[tab.value] }}</span>
    </button>
  }
</div>

<!-- Search & Filters Row -->
<div class="toolbar">
  <div class="toolbar-left">
    <p-iconfield>
      <p-inputicon class="pi pi-search" />
      <input pInputText type="text" placeholder="Search by name, description..." (input)="onFilter(dt, $event)" />
    </p-iconfield>
  </div>
  <div class="toolbar-right">
    <p-button icon="pi pi-filter" label="Filters" [outlined]="true" severity="secondary" />
  </div>
</div>

<!-- Data Table -->
<p-table
  #dt
  [value]="filteredCategories()"
  [paginator]="true"
  paginatorDropdownAppendTo="body"
  [rows]="10"
  [rowsPerPageOptions]="[5, 10, 20]"
  [globalFilterFields]="['name', 'description', 'status']"
  [tableStyle]="{ 'min-width': '100%' }"
  [scrollable]="true"
  [stripedRows]="false"
  currentPageReportTemplate="Showing {first}-{last} from {totalRecords}"
  [showCurrentPageReport]="true"
  class="customer-table"
>
  <ng-template #header>
    <tr>
      <th pSortableColumn="name">Category <p-sortIcon field="name" /></th>
      <th pSortableColumn="status">Status <p-sortIcon field="status" /></th>
      <th style="width: 4rem">Action</th>
    </tr>
  </ng-template>

  <ng-template #body let-category>
    <tr class="table-row">
      <td>
        <div class="client-cell">
          <div class="client-avatar" [style.background]="getAvatarColor(category.name)">
            {{ getInitials(category.name) }}
          </div>
          <div class="client-info">
            <span class="client-name">{{ category.name }}</span>
            <span class="client-id">{{ category.description }}</span>
          </div>
        </div>
      </td>
      <td>
        <p-tag [value]="category.status" [severity]="getStatusSeverity(category.status)" />
      </td>
      <td>
        <button
          class="action-btn"
          type="button"
          (click)="showActionMenu($event, category)"
          [attr.aria-label]="'Actions for ' + category.name"
        >
          <i class="pi pi-ellipsis-v"></i>
        </button>
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="3" class="empty-message">
        <div class="empty-icon-wrap">
          <i class="pi pi-th-large"></i>
        </div>
        <p class="empty-title">No categories found</p>
        <p class="empty-desc">Try adjusting your search or filters to find what you're looking for.</p>
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- Action Menu -->
<p-menu #actionMenu [model]="menuItems()" [popup]="true" appendTo="body" />

<!-- Confirm Dialog -->
<p-confirmdialog />

<!-- Category Form Dialog -->
<app-category-form
  [visible]="showForm()"
  [category]="editingCategory()"
  (save)="onFormSave($event)"
  (cancel)="onFormCancel()"
/>
